worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Link-unfurl crawlers (Slack, Twitter, etc.) can't run the SPA's JS, so
    # plan links are routed to the API's server-rendered OG meta (see the
    # /app/plans/:id location). 1 = treat as a preview bot.
    map $http_user_agent $plan_unfurl_bot {
        default 0;
        # NON-capturing group (?:…) — a capturing group here would set $1 and
        # clobber the location's plan-id capture used in proxy_pass.
        "~*(?:Slackbot|Twitterbot|facebookexternalhit|LinkedInBot|Discordbot|TelegramBot|WhatsApp|redditbot|Embedly|Pinterest|bingbot|Googlebot|Applebot|vkShare|W3C_Validator|Iframely|SkypeUriPreview)" 1;
    }

    # Upstream definitions
    upstream api_backend {
        server api:3000;
    }

    upstream frontend_backend {
        server frontend:80;
    }

    upstream mcp_backend {
        server mcp:8080;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name _;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — replace with your cert paths after certbot init
        # Replace DOMAIN with your actual domain (e.g. planner.example.com)
        ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Content-Security-Policy. script-src keeps 'unsafe-inline' for the CRA
        # runtime chunk + the pre-paint dark-mode script; style-src + font-src
        # allowlist Google Fonts (loaded from index.html); connect-src 'self'
        # covers the same-origin /api calls and the wss collaboration socket.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

        # MCP discovery endpoint
        location = /.well-known/mcp.json {
            proxy_pass http://mcp_backend/.well-known/mcp.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API — WebSocket
        location /api/ws {
            proxy_pass http://api_backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # MCP Server (Streamable HTTP + SSE)
        location /mcp {
            proxy_pass http://mcp_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300;
        }

        # OAuth authorization server (MCP connectors: claude.ai / Claude Design,
        # ChatGPT Apps SDK, and other OAuth 2.1 MCP clients via DCR).
        # AS endpoints live under /oauth/*; discovery metadata at the standard
        # /.well-known/oauth-* paths. None collide with the UI's root routes
        # (/login, /register, /auth/callback). /internal/* is intentionally NOT
        # proxied here — it stays private to the docker network.
        location /oauth/ {
            proxy_pass http://mcp_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # The consent page POSTs to /oauth/consent (self), then the server
            # 302s to the connector's callback (e.g. claude.ai, chatgpt.com).
            # The global CSP's `form-action 'self'` blocks that cross-origin
            # redirect in strict browsers (e.g. Safari). Scope a CSP here that
            # allows the known connector callback origins. NB: a location-level
            # add_header drops ALL inherited add_headers, so the other security
            # headers are re-declared.
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; form-action 'self' https://claude.ai https://chatgpt.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
        }
        location /.well-known/oauth-authorization-server {
            proxy_pass http://mcp_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /.well-known/oauth-protected-resource {
            proxy_pass http://mcp_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Plan-link unfurls — crawler bots get the API's server-rendered OG meta
        # (visibility-safe); humans get the SPA. Regex location, so it's matched
        # before the `location /` frontend catch-all below.
        location ~ "^/app/plans/(?<plan_id>[0-9a-fA-F-]{36})/?$" {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Named capture ($plan_id) is immune to $1 being overwritten by the
            # User-Agent map regex above.
            if ($plan_unfurl_bot) {
                proxy_pass http://api_backend/plans/$plan_id/preview;
            }
            proxy_pass http://frontend_backend;
        }

        # Frontend
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
