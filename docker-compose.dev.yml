# AgentPlanner — Local development with hot reload
# Usage: docker compose -f docker-compose.dev.yml up
#
# Source-mounted variants of the api + frontend services. Edit code locally,
# the container picks the change up via nodemon (api) or webpack-dev-server
# (frontend). Postgres / Neo4j / Graphiti / MCP fall back to local.yml's
# prod-style images via the `extends` mechanism — keep both files in sync.
#
# When to use this vs docker-compose.local.yml:
#   - dev.yml: iterating on api or frontend source. Save → see change.
#   - local.yml: smoke-testing the prod build path before merging.
#
# Limitations:
#   - The api Dockerfile.prod runs `npm ci --omit=dev`, so dev deps (nodemon,
#     drizzle-kit, etc.) are not in the prod image. We use a thin host-side
#     wrapper instead — the container runs `node` directly from the mounted
#     source after a one-time `npm install`. See the api block below.
#   - Frontend uses CRA's `react-scripts start`. WebSocket HMR works because
#     CRA proxies through the host port mapping.
#   - File watching on macOS uses chokidar polling (CHOKIDAR_USEPOLLING=true)
#     which is slower than native but works reliably across mounts.

networks:
  internal:
    driver: bridge

volumes:
  pgdata-dev:
  neo4j-dev:
  api-node-modules:
  ui-node-modules:

services:
  # ─── PostgreSQL 17 + pgvector ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER: agentplanner
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: agentplanner
    ports:
      - "5433:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentplanner"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── API Server with hot reload ──────────────────────────────
  # Source bind-mounted. Container runs nodemon against ./src.
  # node_modules is in a NAMED volume to avoid host/container ABI mismatch.
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon --watch src --ext js,mjs --exec 'node src/index.js'"
    restart: unless-stopped
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      graphiti:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgres://agentplanner:localdevpassword@postgres:5432/agentplanner?sslmode=disable
      JWT_SECRET: local-dev-jwt-secret-not-for-production
      FRONTEND_URL: http://localhost:3001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GRAPHITI_INTERNAL_URL: http://graphiti:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules
    ports:
      - "3000:3000"

  # ─── Frontend (CRA dev server with HMR) ──────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    restart: unless-stopped
    networks: [internal]
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:3000
      PORT: "3001"
      WDS_SOCKET_PORT: "3001"
      CHOKIDAR_USEPOLLING: "true"
      BROWSER: none
    volumes:
      - ../agent-planner-ui:/app
      - ui-node-modules:/app/node_modules
    ports:
      - "3001:3001"

  # ─── Neo4j Community ─────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    networks: [internal]
    volumes:
      - neo4j-dev:/data
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-localdevpassword}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Graphiti MCP ────────────────────────────────────────────
  graphiti:
    image: zepai/knowledge-graph-mcp:standalone
    command: ["uv", "run", "main.py"]
    restart: unless-stopped
    networks: [internal]
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./docker/graphiti/config-neo4j.yaml:/app/mcp/config/config.yaml:ro
    environment:
      CONFIG_PATH: /app/mcp/config/config.yaml
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdevpassword}
      NEO4J_DATABASE: neo4j
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GRAPHITI_GROUP_ID: default
      SEMAPHORE_LIMIT: "10"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── MCP Server (also hot reload) ────────────────────────────
  mcp:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon --watch src --ext js,mjs src/server-http.js"
    restart: unless-stopped
    networks: [internal]
    depends_on:
      - api
    environment:
      MCP_TRANSPORT: http
      API_URL: http://api:3000
      PORT: "3100"
      HOST: 0.0.0.0
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../agent-planner-mcp:/app
    ports:
      - "3100:3100"
