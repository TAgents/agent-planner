services:
  # ─── Core: PostgreSQL with pgvector ─────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    profiles: [core]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-agentplanner}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentplanner}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Core: API server ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    profiles: [core]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-agentplanner}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-agentplanner}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GRAPHITI_INTERNAL_URL: ${GRAPHITI_INTERNAL_URL:-http://graphiti:8000}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
      - ./migrations:/app/migrations:ro

  # ─── Core: Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ../agent-planner-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [core]
    depends_on: [api]
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    environment:
      REACT_APP_API_URL: ${API_BASE_URL:-http://localhost:3000}

  # ─── Neo4j Community (Graph Database for Graphiti) ─────────
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    profiles: [core]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-devpassword}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Graphiti MCP (Knowledge Graph) ────────────────────────
  # Image defaults to FalkorDB. We mount a Neo4j config and override the
  # command to skip the embedded FalkorDB startup, leaving only the MCP server.
  graphiti:
    image: zepai/knowledge-graph-mcp:standalone
    command: ["uv", "run", "main.py"]
    restart: unless-stopped
    profiles: [core]
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./docker/graphiti/config-neo4j.yaml:/app/mcp/config/config.yaml:ro
    environment:
      CONFIG_PATH: /app/mcp/config/config.yaml
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-devpassword}
      NEO4J_DATABASE: neo4j
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GRAPHITI_GROUP_ID: default
      SEMAPHORE_LIMIT: "10"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  neo4jdata:
