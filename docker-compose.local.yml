# AgentPlanner — Local Release Candidate
# Runs the full stack locally in containers (Mac/ARM compatible)
# Usage: docker compose -f docker-compose.local.yml up --build
#
# Services: postgres, api, frontend, mcp
# Ports: API=3000, UI=3001, MCP=3100

networks:
  internal:
    driver: bridge

volumes:
  pgdata-local:
  neo4j-local:

services:
  # ─── PostgreSQL 17 + pgvector ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER: agentplanner
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: agentplanner
    ports:
      - "5433:5432"
    volumes:
      - pgdata-local:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentplanner"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── API Server ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      graphiti:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://agentplanner:localdevpassword@postgres:5432/agentplanner?sslmode=disable
      JWT_SECRET: local-rc-jwt-secret-not-for-production
      FRONTEND_URL: http://localhost:3001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Graphiti bridge (connects to internal Graphiti MCP server)
      GRAPHITI_INTERNAL_URL: http://graphiti:8000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend (React via nginx) ──────────────────────────────
  frontend:
    build:
      context: ../agent-planner-ui
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_API_URL: http://localhost:3000
    restart: unless-stopped
    networks: [internal]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:80"

  # ─── Neo4j Community (Graph Database for Graphiti — internal only) ──
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    networks: [internal]
    volumes:
      - neo4j-local:/data
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-localdevpassword}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Graphiti MCP (Knowledge Graph — internal only) ────────
  # Image defaults to FalkorDB. We mount a Neo4j config and override the
  # command to skip the embedded FalkorDB startup, leaving only the MCP server.
  graphiti:
    image: zepai/knowledge-graph-mcp:standalone
    command: ["uv", "run", "main.py"]
    restart: unless-stopped
    networks: [internal]
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./docker/graphiti/config-neo4j.yaml:/app/mcp/config/config.yaml:ro
    environment:
      CONFIG_PATH: /app/mcp/config/config.yaml
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdevpassword}
      NEO4J_DATABASE: neo4j
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GRAPHITI_GROUP_ID: default
      SEMAPHORE_LIMIT: "10"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── MCP Server (HTTP mode) ─────────────────────────────────
  mcp:
    build:
      context: ../agent-planner-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [internal]
    depends_on:
      api:
        condition: service_healthy
    environment:
      MCP_TRANSPORT: http
      API_URL: http://api:3000
      PORT: "3100"
      HOST: 0.0.0.0
      NODE_ENV: production
    ports:
      - "3100:3100"
